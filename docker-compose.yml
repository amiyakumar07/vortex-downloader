version: '3.8'

services:
  backend:
    build: ./backend
    container_name: vortex-backend
    ports:
      - "5000:5000"
    environment:
      - NODE_ENV=production
      - JWT_SECRET=${JWT_SECRET}
      - UNIVERSAL_API=http://universal-downloader:3000
    volumes:
      - ./downloads:/app/downloads
      - ./logs:/var/log/vortex-downloader
    restart: unless-stopped
    networks:
      - internal
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:5000/api/health', (r) => {r.statusCode === 200 ? process.exit(0) : process.exit(1)})"]
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 10s

  universal-downloader:
    build: ../universalDownloader
    container_name: universal-downloader
    ports:
      - "3000:3000"
    restart: unless-stopped
    networks:
      - internal

  nginx:
    image: nginx:alpine
    container_name: vortex-nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/vortex-downloader.conf:/etc/nginx/conf.d/default.conf
      - ./ssl:/etc/nginx/ssl
      - ./frontend:/var/www/vortex-downloader/frontend
    depends_on:
      - backend
    restart: unless-stopped
    networks:
      - internal

networks:
  internal:
    driver: bridge